<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header id="cabecera">
        <h1>ALIANZA REBELDE</h1>
        <nav>
            <ul>
                <li><a href="#" id="hangarEnl">Hangar</a></li>
                <li><a href="#" id="pilotosEnl">Pilotos</a></li>
                <li><a href="#" id="misionesEnl">Misiones</a></li>
                <li><a href="#" id="dashboardEnl">Dashboard</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section id="hangar">

        </section>
        <section id="pilotos" class="oculto">
            <!-- Form sirve para poner los formularios-->
            <form id="formularioPiloto">
                <h2>Registro de pilotos</h2>
                <a>Gestion del personal de combate</a>
                <br>
                <h3>Añadir nuevo piloto</h3>
                Nombre
                <input id="nombrePil" type="text" placeholder="Nombre" required>
                <br>
                Rango
                <input id="rangoPil" type="text" placeholder="Rango" required>
                <br>
                Nave
                <select id="select" type="text" required>
                </select>
                
                <br>
                Victorias en combate
                <input id="victoriasPil" type="number" required>
                <br>
                Estado
                <select id="Estado" type="text" required>
                    <option>2</option>
                </select>
                
                <br>
                <button id="agregar">Agregar</button>
            </form>

            <ul id="lista"></ul>
        </section>
        <section id="misiones" class="oculto">

        </section>
        <section id="dashboard" class="oculto">

        </section>
    </main>

    <footer>
        <p>Que la fuerza te acompañe • Proyecto DAW 2026</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
